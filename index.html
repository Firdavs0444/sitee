<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulnoza uchun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6ea 0%, #ffb3c1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 2px solid #ff4d6d;
            position: relative;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        h2 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            position: relative;
            min-height: 200px;
            margin-top: 20px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 80%;
            max-width: 250px;
        }

        .btn-yes {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            z-index: 10;
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no, .btn-maybe {
            background-color: #fff;
            color: #777;
            border: 2px solid #ddd;
            position: absolute;
            transition: left 0.1s ease, top 0.1s ease;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffb3c1;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        .btn-submit {
            background-color: #ff4d6d;
            color: white;
            width: 100%;
        }

        .final-text {
            color: #ff4d6d;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.6;
        }

        .heart {
            font-size: 50px;
            color: #ff4d6d;
            animation: beat 0.6s infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes beat {
            to { transform: scale(1.1); }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 21px;
            }
            button {
                font-size: 15px;
                padding: 12px 24px;
            }
            .card {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="step active" id="step1">
            <div class="heart">❤️</div>
            <h2>Gulnoza aylanishga boramizami? Asabimi bizmasdan tezro bos</h2>
            <div class="btn-container" id="container1">
                <button class="btn-yes" onclick="nextStep(2)" style="position: absolute; top: 10px;">Ha boraman</button>
                <button class="btn-no" id="noBtn" style="top: 75px;">Vaqtim yo'qroq</button>
                <button class="btn-maybe" id="maybeBtn" style="top: 140px;">Bormiman</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h2>Qatta uchrashamiz? 📍</h2>
            <input type="text" id="placeInput" placeholder="qatta korishishimizani yozaqo">
            <button class="btn-submit" onclick="submitPlace()">Keyingisi</button>
        </div>

        <div class="step" id="step3">
            <h2>Soat nechchida? ⏰</h2>
            <input type="time" id="timeInput">
            <button class="btn-submit" onclick="submitTime()">Yuborish</button>
        </div>

        <div class="step" id="step4">
            <div class="heart">💖</div>
            <h2>Ura! Kelishdik!</h2>
            <div class="final-text" id="summaryText"></div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8997034338:AAELNY2SNwfIZFKjW0N7-jneZB0fgYC5ctc'; 
        const CHAT_ID = '7714558401'; 

        const noBtn = document.getElementById('noBtn');
        const maybeBtn = document.getElementById('maybeBtn');
        const container = document.getElementById('container1');

        let joy = "";
        let vaqt = "";

        function moveButton(button) {
            const containerRect = container.getBoundingClientRect();
            const btnRect = button.getBoundingClientRect();

            const maxX = containerRect.width - btnRect.width;
            const maxY = containerRect.height - btnRect.height;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            button.style.left = randomX + 'px';
            button.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', () => moveButton(noBtn));
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(noBtn); });

        maybeBtn.addEventListener('mouseover', () => moveButton(maybeBtn));
        maybeBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(maybeBtn); });

        function nextStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
        }

        function submitPlace() {
            const input = document.getElementById('placeInput').value.trim();
            if(input !== "") {
                joy = input;
                nextStep(3);
            }
        }

        function submitTime() {
            const input = document.getElementById('timeInput').value;
            if(input !== "") {
                vaqt = input;
                document.getElementById('summaryText').innerHTML = `Joy: ${joy}<br>Soat: ${vaqt} da ko'rishamiz!`;
                nextStep(4);
                sendTelegram();
            }
        }

        function sendTelegram() {
            const message = `Gulnoza rozilik berdi! ❤️\n📍 Joy: ${joy}\n⏰ Vaqt: ${vaqt}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`;
            
            fetch(url).catch(err => console.log(err));
        }
    </script>

</body>
</html>
